name: CI

on:
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate manifest.json
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"
      - name: Syntax-check scripts
        run: |
          for f in src/*.js; do
            node --check "$f"
          done
      - name: Lint extension structure
        run: npx --yes web-ext lint --source-dir . --ignore-files "docs/**" "store/**" "dist/**" "private/**" --warnings-as-errors=false
